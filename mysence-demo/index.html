## 1. 总体概述

MySence 是一个基于主动推断（Active Inference）理论的智能工作台系统，核心目标是将知识管理、AI 推理和工作流编排融合为统一的用户体验。系统采用分层架构设计，从底层的超图知识引擎到上层的多模态交互界面，每一层都围绕"感知-行动-更新"的闭环构建。

## 2. 核心模块

### 2.1 超图知识引擎（Hypergraph Engine）

超图引擎是 MySence 的知识存储与推理核心。与传统的图数据库不同，超图允许一条边连接任意数量的节点（超边），这使得系统能够自然地表达复杂的多实体关系。每条超边携带元数据（置信度、时间戳、来源），支持时序知识追踪。

### 2.2 自由能计算器（Free Energy Calculator）

自由能计算器实现了基于贝叶斯推断的预测误差最小化算法。系统持续生成对当前上下文的预测，当感知输入与预测不匹配时，自由能上升，驱动世界模型的更新。这一机制确保了系统在面对不确定性时的自适应能力。

### 2.3 PID 元认知控制器

PID 元认知控制器借鉴工业控制论中的 PID 调节器思想，对 Agent 的推理深度、行动频率和感知灵敏度进行动态调控。P 项响应当前误差（预测偏差），I 项累积历史误差趋势（学习效果），D 项预判误差变化率（防止震荡）。

## 3. 数据流

\`\`\`
用户输入 → Prompt 编码 → 超图查询 → 自由能评估 → 行动规划 → 执行与感知 → 世界模型更新
\`\`\`

## 4. 技术栈

- 后端：C++20 / CMake / SQLite3 / libcurl
- 前端：Vue 3 / D3.js / Fluent Design 2
- AI 集成：OpenAI 兼容 API（DeepSeek / Claude）
- 部署：Windows 桌面（.NET 9 守护进程）`,wordCount:486,updatedAt:"2025-12-18T14:30:00Z",tags:["架构","核心设计","超图"]},{id:"code-agent-core",name:"AgentCore.cs",type:"code",language:"csharp",content:`namespace MySence.Agents.Core
{
    /// <summary>
    /// Agent 核心执行器 — 负责单轮 Think-Act-Observe 循环
    /// 实现主动推断框架中的感知-行动-更新闭环
    /// </summary>
    public class AgentCore
    {
        private readonly IWorldModel _worldModel;
        private readonly IPidController _pidController;
        private readonly IHypergraphStore _store;
        private readonly ILogger<AgentCore> _logger;

        // 自由能阈值：超过此值时触发世界模型更新
        private const double FreeEnergyThreshold = 0.15;

        public AgentCore(
            IWorldModel worldModel,
            IPidController pidController,
            IHypergraphStore store,
            ILogger<AgentCore> logger)
        {
            _worldModel = worldModel
                ?? throw new ArgumentNullException(nameof(worldModel));
            _pidController = pidController
                ?? throw new ArgumentNullException(nameof(pidController));
            _store = store
                ?? throw new ArgumentNullException(nameof(store));
            _logger = logger
                ?? throw new ArgumentNullException(nameof(logger));
        }

        /// <summary>
        /// 执行一轮完整的推理循环
        /// 返回本次循环的执行结果，包含行动、感知和模型更新信息
        /// </summary>
        public async Task<CycleResult> RunCycleAsync(
            AgentContext context,
            CancellationToken ct = default)
        {
            // Phase 1: Think — 生成预测并评估自由能
            var prediction = _worldModel.Predict(context.CurrentState);
            var freeEnergy = ComputeFreeEnergy(
                prediction, context.Observation);

            _logger.LogInformation(
                "Cycle {Id}: FreeEnergy = {FE:F4}",
                context.CycleId, freeEnergy);

            // Phase 2: Act — 根据自由能偏差规划行动
            var action = _pidController.ComputeAction(
                freeEnergy, context.History);

            // Phase 3: Observe — 执行行动并收集感知反馈
            var observation = await ExecuteActionAsync(
                action, context, ct);

            // Phase 4: Update — 更新世界模型（仅当自由能超阈值）
            if (freeEnergy > FreeEnergyThreshold)
            {
                _worldModel.Update(prediction, observation);
                _logger.LogInformation(
                    "World model updated: delta = {Delta:F4}",
                    freeEnergy - FreeEnergyThreshold);
            }

            return new CycleResult(
                context.CycleId, action, observation, freeEnergy);
        }

        /// <summary>
        /// 计算预测与观测之间的自由能（预测误差）
        /// 使用 KL 散度衡量分布差异
        /// </summary>
        private double ComputeFreeEnergy(
            Prediction prediction, Observation observation)
        {
            return prediction.KlDivergenceFrom(observation.Distribution);
        }

        private async Task<Observation> ExecuteActionAsync(
            AgentAction action, AgentContext ctx,
            CancellationToken ct)
        {
            // 根据行动类型分派执行器
            return action.Type switch
            {
                ActionType.Query => await _store.QueryAsync(
                    action.Parameters, ct),
                ActionType.Transform => await _store.TransformAsync(

## 动机

在传统 AI Agent 系统中，推理深度、搜索广度和行动频率通常是硬编码的静态参数。这种方式无法适应不同任务复杂度的变化：简单任务过度推理浪费时间，复杂任务推理不足导致遗漏。

MySence 引入工业控制论中的 PID 调节器思想，将 Agent 的"元认知"参数化为可动态调控的变量。

## PID 三项

### P — 比例项（Proportional）

响应当前预测误差的大小。当自由能突然升高（环境发生意外变化）时，P 项立即增大行动力度，快速缩小误差。

\`P_output = Kp * current_error\`

### I — 积分项（Integral）

累积历史误差趋势。当系统反复出现微小偏差时，I 项逐渐增大，推动更根本的策略调整。这防止了"反复试错但始终差一点"的 stagnation 问题。

\`I_output = Ki * sum(errors over recent N cycles)\`

### D — 微分项（Derivative）

预判误差变化率。当误差快速减小时，D 项提前减小行动力度，防止 overshoot（过度修正导致的震荡）。

\`D_output = Kd * d(error)/dt\`

## 调控目标

| 参数 | 受控变量 | 调控方向 |
|------|---------|---------|
| 推理深度 | Think 阶段的搜索层数 | 误差大 → 加深 |
| 感知频率 | Observe 阶段的数据采集间隔 | 误差变化快 → 加密 |
| 行动力度 | Act 阶段的执行强度 | 误差大 → 加强 |

## 自适应增益

Kp、Ki、Kd 三个增益系数本身也随任务类型自适应调整。系统维护一个"任务-增益"映射表，基于历史执行效果（自由能收敛速度）动态更新增益值。`,wordCount:352,updatedAt:"2025-12-19T16:45:00Z",tags:["PID","元认知","控制论"]},{id:"doc-word-spec",name:"产品需求规格说明书.docx",type:"markdown",parsedBy:"pandoc 解析",content:`# 产品需求规格说明书

## 1. 项目背景

本项目旨在开发一套基于主动推断理论的智能工作台系统 MySence，为企业用户提供知识管理、AI 推理和工作流编排的一体化解决方案。

## 2. 功能需求

### 2.1 文档管理

- 支持 Word（.docx）、PowerPoint（.pptx）、Excel（.xlsx）格式的自动解析
- 通过 pandoc 引擎将 Office 文档转换为 Markdown 富文本，保留标题层级、列表、表格等结构
- 支持双向编辑：用户修改 Markdown 内容后可回写为原始格式

### 2.2 多 Agent 协作

系统内置 5 类 Agent，通过 A2A 协议协作完成任务：

| Agent | 职责 | 技术栈 |
|-------|------|--------|
| Orchestrator | 任务分解与调度 | C++20 |
| Coder | 代码生成与修改 | Python/C# |
| Reviewer | 安全审查与质量评估 | 静态分析 |
| FileSurfer | 文件检索与索引 | 全文搜索 |
| WebSurfer | 网络搜索与抓取 | libcurl |

### 2.3 创意自动化

通过 Python 脚本操作 Maya、Blender、Photoshop 等创意软件，实现工作流自动化。

## 3. 非功能需求

- 响应时间：文档解析 < 3 秒（10MB 以内）
- 并发支持：多租户隔离，单租户最大 10 个并发 Agent
- 安全策略：RBAC 权限模型 + API Key 加密存储`,wordCount:298,updatedAt:"2025-12-22T10:00:00Z",tags:["需求文档","Word","pandoc"]},{id:"doc-excel-metrics",name:"Agent 性能指标.xlsx",type:"spreadsheet",parsedBy:"pandoc 解析",sheets:[{name:"Coder Agent",columns:[{key:"metric",label:"指标",width:140},{key:"thisWeek",label:"本周均值",width:100},{key:"lastWeek",label:"上周均值",width:100},{key:"trend",label:"变化趋势",width:100}],rows:[{metric:"任务完成率",thisWeek:"94.2%",lastWeek:"91.8%",trend:"↑ 2.4%"},{metric:"平均响应时间",thisWeek:"1.3s",lastWeek:"1.5s",trend:"↓ 0.2s"},{metric:"代码通过率",thisWeek:"87.5%",lastWeek:"85.2%",trend:"↑ 2.3%"},{metric:"回滚次数",thisWeek:"3",lastWeek:"5",trend:"↓ 2"}]},{name:"Reviewer Agent",columns:[{key:"metric",label:"指标",width:140},{key:"thisWeek",label:"本周均值",width:100},{key:"lastWeek",label:"上周均值",width:100},{key:"trend",label:"变化趋势",width:100}],rows:[{metric:"审查覆盖率",thisWeek:"98.1%",lastWeek:"97.5%",trend:"↑ 0.6%"},{metric:"误报率",thisWeek:"4.2%",lastWeek:"5.1%",trend:"↓ 0.9%"},{metric:"漏报率",thisWeek:"1.9%",lastWeek:"2.5%",trend:"↓ 0.6%"}]}],sheetCount:2,updatedAt:"2025-12-21T14:30:00Z",tags:["性能指标","Excel","pandoc"]},{id:"doc-ppt-arch",name:"系统架构汇报.pptx",type:"slide",parsedBy:"pandoc 解析",slides:[{layout:"title",title:"MySence 智能工作台",subtitle:"系统架构设计汇报",footer:"架构组 · 2025年12月"},{layout:"section",title:"整体架构",subtitle:"三层架构设计"},{layout:"bullets",title:"整体架构",bullets:[{text:"知识层：超图引擎 + 自由能计算器",level:0},{text:"控制层：PID 元认知控制器 + Saga 补偿",level:0},{text:"交互层：多 Agent 协作 + Fluent Design 2 前端",level:0}]},{layout:"bullets",title:"核心创新",bullets:[{text:"基于主动推断的自适应推理深度调节",level:0},{text:"超图知识表示支持 n 元关系建模",level:0},{text:"PID 控制论在 Agent 元认知中的工程化应用",level:0},{text:"Saga 模式保证分布式事务的最终一致性",level:0}]},{layout:"table",title:"技术选型",table:{headers:["层","技术","版本"],rows:[["后端","C++20 / CMake / SQLite3","C++20"],["前端","Vue 3 / D3.js / Fluent Design 2","Vue 3.5"],["AI 集成","OpenAI 兼容 API","DeepSeek / Claude"],["部署","Windows 桌面 + .NET 9",".NET 9"]]}},{layout:"bullets",title:"路线图",bullets:[{text:"Q1：核心引擎 + 单 Agent MVP" ontent:'AI 创意辅助的核心价值：不是替代人类创意，而是作为"创意催化剂"——通过结构化的发散方法（如 SCAMPER）扩展人类的创意空间，同时用三角联想发现看似无关概念之间的深层联系。',color:"#1a3a4a",source:"ai",createdAt:"2025-12-18T10:12:00Z"},{id:"node-sticky-4",type:"sticky",x:480,y:300,width:200,height:130,content:"创意画布的设计原则：无限空间但不迷失——需要智能缩放、局部聚焦和上下文感知导航。用户的注意力是有限资源，界面应主动管理信息密度。",color:"#4da347",source:"human",createdAt:"2025-12-18T10:20:00Z"},{id:"node-ai-5",type:"ai-generated",x:340,y:480,width:260,height:140,content:'SCAMPER 方法论与主动推断的结合点：每种变换操作（替代、组合、调整等）本质上是在知识超图上执行一次"结构变异"，而自由能评估则用于筛选出最有价值的变异方向。',color:"#1a3a4a",source:"ai",createdAt:"2025-12-18T10:30:00Z"}],hD=[{id:"edge-1-2",source:"node-sticky-1",target:"node-text-2"},{id:"edge-1-3",source:"node-sticky-1",target:"node-ai-3"},{id:"edge-3-5",source:"node-ai-3",target:"node-ai-5"}],pD={variants:[{dimension:"substitute",label:"替代",content:'用"类比推理引擎"替代传统的 SCAMPER 检查表——不是逐项检查，而是自动从跨领域知识库中检索结构相似的概念，将替代过程从"人工列举"升级为"智能匹配"。',newNodeId:"scamper-substitute"},{dimension:"combine",label:"组合",content:'将三角联想与 SCAMPER 组合为"联想-变换链"——先通过三角联想发现三个概念之间的桥梁，再对桥梁概念执行 SCAMPER 变换，产生双层创意叠加效果。',newNodeId:"scamper-combine"},{dimension:"adapt",label:"调整",content:'将生物进化中的"基因漂变"机制调整应用到创意生成中——在约束边界内引入小幅随机变异，通过自由能评估自然选择最有价值的方向，实现"有方向的随机探索"。',newNodeId:"scamper-adapt"},{dimension:"modify",label:"修改/放大",content:'将创意输出从"单个节点"修改为"创意流"——不是一个静态的想法，而是一系列连续演化的创意节点，每个节点基于前一个节点的反馈进行迭代，形成创意的时间序列。',newNodeId:"scamper-modify"},{dimension:"put-to-other-use",label:"改变用途",content:'将"魔鬼代言人"批判工具改变用途为"创意压力测试器"——不是批判创意的缺陷，而是模拟极端用户场景和边缘条件，验证创意在这些条件下的鲁棒性。',newNodeId:"scamper-put"},{dimension:"eliminate",label:"消除",content:'消除"约束边界"中的刚性限制，改为弹性约束——允许 Agent 在特定条件下暂时突破边界，但引入"弹性回弹力"，使其在超出一定距离后被自然拉回。',newNodeId:"scamper-eliminate"},{dimension:"reverse",label:"反转",content:'反转创意流程的方向：不是从问题出发寻找方案，而是从随机生成的方案反推它能解决什么问题。这种方法常用于发现"隐藏需求"和意外创新。',newNodeId:"scamper-reverse"}]},Zo={concepts:["贝叶斯推断","日本侘寂美学","模块化架构"],bridge:'三个概念的共同内核是"在不完整中追求最优"。贝叶斯推断接受先验知识的不完整，通过持续更新逼近真实分布；侘寂美学拥抱不完美与无常，在不完整中发现美；模块化架构承认单个模块能力的有限，通过组合实现复杂功能。将这一哲学应用到 AI 创意系统中：不要追求"完美的创意"，而是在"足够好"的基础上持续迭代——每次迭代都是一次微小的自由能降低。',newNodeId:"trisociation-1"},vD={critiques:[{point:'"结构化发散"本身就是矛盾修辞',detail:'SCAMPER 等结构化方法的前提假设——创意可以通过固定框架生成——可能本身就是错误的。真正突破性的创新往往来自对框架本身的打破，而非在框架内的操作。将发散思维"结构化"可能适得其反，限制而非扩展创意空间。'},{point:"缺乏创意质量评估标准",detail:'当前的自由能评估只能衡量创意与已有知识网络的一致性，但这恰恰会排斥真正原创的想法——因为原创想法本质上就是"高自由能"的。需要一套独立的创意质量评估维度：新颖性、可行性、影响力，而非单一的"预测误差"指标。'},{point:"人机创意边界模糊带来的责任问题",detail:'当 AI 不只是工具而是"创意催化剂"时，创意成果的归属变得模糊。如果 AI 提示了关键的方向转折点，这个创意算人类的还是 AI 的？在知识产权和学术诚信日益重要的背景下，创意画布需要内置"贡献追踪"机制，记录每个创意节点的真实来源。'}]},gD=[{id:"cs1",title:"Blender 3D 模型批量变体",time:"15:20",active:!0},{id:"cs2",title:"Photoshop 产品图批处理",time:"14:05",active:!1},{id:"cs3",title:"Maya 骨骼自动绑定",time:"12:30",active:!1},{id:"cs4",title:"Maya 渲染队列自动化",time:"昨天",active:!1}],mD=[{role:"assistant",content:`我是你的 AI 创意助手。我可以调度 **FileSurfer** 扫描文件、**Coder** 生成 Python 脚本、**Reviewer** 验证安全性。
